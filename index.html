<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>
     <h1>VAI DAR NAMORO❤️</h1>
    <HEAder>
        <nav>
            <div class="logo">bah meu</div>
            <li><a href="#home">home</a></li>
            <li><a href="#galeria">Galeria</a></li>
            <li><a href="#contato">Contato</a></li>
        </nav>
    </HEAder>
    <main>
        <section id="Galeria">
            <h2>A galeria da lenda</h2>
            <div class="galeria">
             <div class="galeria-item">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSP0oPXog7bk8Y5okSH1G1ugCp8izVnn0eCbw&s" alt="Teu pai " class="img-clicavel" id="seupai">
                    <img src="https://i.scdn.co/image/ab67616d0000b273fe36f9691350b91117beefd2" alt="faz L" class="img-clicavel" id="fazOL">
            </div>
            </div>

        </section>
            
        <section id="Contato">
            <h2>Fale conosco</h2>
            <div class="contato-container">
                <div class="contato-inf"></div>
                <h3>informaçoes</h3>
                <br> <strong>Endereço:</strong>
                <p>Senai Floripa</p>

            </div>

        </section>

        <form class="contato-for" id="meuFormulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required placeholder="digite seu nome porra">
            </div>
            <div class="form-group">
                <label for="Email">Email:</label>
                <input type="text" id="Email" required placeholder="digite seu endereço">
            </div>
            <div class="form-group">
                <label for="cpf">cpf:</label>
                <input type="text" id="cpf" required placeholder="digite seu cpf">
            </div>
            <div class="form-group">
                <label for="cartao">Numero do cartao:</label>
                <textarea id="cartao" required placeholder="digite os 4 ultimos digitos do seu cartao"></textarea>
            </div>
        </form>
    </main>

<footer>
